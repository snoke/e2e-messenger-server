services:
  gateway:
    image: symfony-realtime-stack-gateway-http3
    build: ./gateway/rust-http3-gateway
    command: null
    ports:
      - "4433:4433/udp"
      - "8080:8080"
      - "8081:8080"
    environment:
      - GATEWAY_TRANSPORT=webtransport
      - WEBTRANSPORT_PORT=4433
      - HTTP_API_PORT=8080
      - MAX_CONNECTIONS_PER_USER=10
      - CONNECTION_STALE_SECONDS=45
      - CONNECTION_PRUNE_INTERVAL_SECONDS=10
      - CERT_PEMFILE=/run/certs/dev_cert.pem
      - KEY_PEMFILE=/run/certs/dev_key.pem
    volumes:
      - ./scripts/keys/dev_public.pem:/run/keys/dev_public.pem:ro
      - ./gateway/rust-http3-gateway/certs/dev_cert.pem:/run/certs/dev_cert.pem:ro
      - ./gateway/rust-http3-gateway/certs/dev_key.pem:/run/certs/dev_key.pem:ro
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    environment:
      - VITE_REALTIME_TRANSPORT=http3
      - VITE_WT_URL=${VITE_WT_URL:-https://127.0.0.1:4433/}
      - VITE_WT_CERT_HASH=${VITE_WT_CERT_HASH:-}
