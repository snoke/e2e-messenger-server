services:
  symfony:
    volumes:
      - ./symfony:/app

  symfony-consumer:
    volumes:
      - ./symfony:/app

  redis-init:
    image: redis:7-alpine
    depends_on:
      - redis
    entrypoint:
      - sh
      - -lc
      - |
        until redis-cli -h redis ping >/dev/null 2>&1; do
          sleep 0.5
        done
        redis-cli -h redis DEL ws.outbox >/dev/null

  gateway:
    build:
      context: ./gateway/rust-http3-gateway
      dockerfile: Dockerfile.dev
    working_dir: /app
    environment:
      - CARGO_HOME=/cargo
    volumes:
      - ./gateway/rust-http3-gateway:/app
      - gateway-target:/app/target
      - cargo-registry:/cargo/registry
      - cargo-git:/cargo/git
    command: ["cargo", "watch", "-w", "src", "-w", "Cargo.toml", "-w", "Cargo.lock", "-x", "run --release"]

volumes:
  gateway-target:
  cargo-registry:
  cargo-git:
