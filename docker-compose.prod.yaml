services:
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - --providers.file.filename=/etc/traefik/traefik.prod.yml
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    environment:
      - TRAEFIK_HOST=${TRAEFIK_HOST}
      - TRAEFIK_ACME_EMAIL=${TRAEFIK_ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.prod.yml:/etc/traefik/traefik.prod.yml:ro
      - ./traefik/acme.json:/etc/traefik/acme.json

  gateway:
    build: ./gateway/gateway-python
    restart: unless-stopped
    environment:
      - WS_MODE=${WS_MODE:-terminator}
      - EVENTS_MODE=${EVENTS_MODE:-}
      - JWT_ALG=RS256
      - JWT_USER_ID_CLAIM=user_id
      - JWT_PUBLIC_KEY=
      - JWT_JWKS_URL=
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - JWT_LEEWAY=${JWT_LEEWAY:-0}
      - SYMFONY_WEBHOOK_URL=${SYMFONY_WEBHOOK_URL:-}
      - SYMFONY_WEBHOOK_SECRET=${SYMFONY_WEBHOOK_SECRET:-}
      - WEBHOOK_RETRY_ATTEMPTS=${WEBHOOK_RETRY_ATTEMPTS:-3}
      - WEBHOOK_RETRY_BASE_SECONDS=${WEBHOOK_RETRY_BASE_SECONDS:-0.5}
      - WEBHOOK_TIMEOUT_SECONDS=${WEBHOOK_TIMEOUT_SECONDS:-5}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  symfony:
    build:
      context: ./symfony
      dockerfile: Dockerfile
      args:
        INSTALL_GRPC: "1"
    restart: unless-stopped
    environment:
      - APP_ENV=prod
      - DATABASE_URL=${DATABASE_URL:-mysql://app:app@mysql:3306/app?serverVersion=mariadb-10.11&charset=utf8mb4}
      - WS_MODE=${WS_MODE:-terminator}
      - WS_GATEWAY_BASE_URL=${WS_GATEWAY_BASE_URL:-}
      - WS_GATEWAY_API_KEY=${WS_GATEWAY_API_KEY:-}
      - WS_PRESENCE_INTERPRETATION_STRATEGY=none
      - WS_PRESENCE_WRITER_TYPE=none
      - JWT_SECRET_KEY=/run/keys/dev_private.pem
      - JWT_PUBLIC_KEY=/run/keys/dev_public.pem
      - JWT_PASSPHRASE=
    volumes:
      - ./scripts/keys/dev_private.pem:/run/keys/dev_private.pem:ro
      - ./scripts/keys/dev_public.pem:/run/keys/dev_public.pem:ro
    healthcheck:
      test: ["CMD", "php", "-r", "file_get_contents('http://localhost:8000/api/ping');"]
      interval: 10s
      timeout: 3s
      retries: 5

  mysql:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-app}
      - MYSQL_USER=${MYSQL_USER:-app}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-app}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2
    restart: unless-stopped
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=${MYSQL_USER:-app}
      - PMA_PASSWORD=${MYSQL_PASSWORD:-app}
    ports:
      - "8181:80"
    depends_on:
      - mysql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["brokers"]
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    profiles: ["brokers"]
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro

volumes:
  redis-data:
  rabbitmq-data:
  mysql-data:
