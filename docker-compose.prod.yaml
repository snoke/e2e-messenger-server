services:
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - --providers.file.filename=/etc/traefik/traefik.prod.yml
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    environment:
      - TRAEFIK_HOST=${TRAEFIK_HOST}
      - TRAEFIK_ACME_EMAIL=${TRAEFIK_ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.prod.yml:/etc/traefik/traefik.prod.yml:ro
      - ./traefik/acme.json:/etc/traefik/acme.json

  gateway:
    build: ./gateway/rust-http3-gateway
    restart: unless-stopped
    ports:
      - "443:4433/udp"
    environment:
      - JWT_ALG=RS256
      - JWT_USER_ID_CLAIM=username
      - JWT_PUBLIC_KEY=
      - JWT_JWKS_URL=
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - JWT_LEEWAY=${JWT_LEEWAY:-0}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - REDIS_DSN=${REDIS_DSN:-redis://redis:6379}
      - REDIS_STREAM=${REDIS_STREAM:-ws.outbox}
      - REDIS_INBOX_STREAM=${REDIS_INBOX_STREAM:-ws.inbox}
      - REDIS_EVENTS_STREAM=${REDIS_EVENTS_STREAM:-ws.events}
      - MAX_CONNECTIONS_PER_USER=${MAX_CONNECTIONS_PER_USER:-0}
      - CONNECTION_STALE_SECONDS=${CONNECTION_STALE_SECONDS:-120}
      - CONNECTION_PRUNE_INTERVAL_SECONDS=${CONNECTION_PRUNE_INTERVAL_SECONDS:-15}
      - WEBTRANSPORT_PORT=4433
      - HTTP_API_PORT=8080
      - CERT_PEMFILE=/run/certs/gateway_cert.pem
      - KEY_PEMFILE=/run/certs/gateway_key.pem
    volumes:
      - ./scripts/keys/dev_public.pem:/run/keys/dev_public.pem:ro
      - ${GATEWAY_CERT_PEM:-./gateway/rust-http3-gateway/certs/dev_cert.pem}:/run/certs/gateway_cert.pem:ro
      - ${GATEWAY_KEY_PEM:-./gateway/rust-http3-gateway/certs/dev_key.pem}:/run/certs/gateway_key.pem:ro

  symfony:
    build:
      context: ./symfony
      dockerfile: Dockerfile
      args:
        INSTALL_GRPC: "1"
    restart: unless-stopped
    environment:
      - APP_ENV=prod
      - DATABASE_URL=${DATABASE_URL:-mysql://app:app@mysql:3306/app?serverVersion=mariadb-10.11.0&charset=utf8mb4}
      - WS_MODE=core
      - WS_TRANSPORT_TYPE=redis_stream
      - WS_PRESENCE_TYPE=http
      - WS_EVENTS_TYPE=redis_stream
      - WS_GATEWAY_BASE_URL=${WS_GATEWAY_BASE_URL:-http://gateway:8080}
      - WS_GATEWAY_API_KEY=${WS_GATEWAY_API_KEY:-}
      - DEMO_INBOX_REDIS_DSN=${DEMO_INBOX_REDIS_DSN:-redis://redis:6379}
      - DEMO_INBOX_REDIS_STREAM=${DEMO_INBOX_REDIS_STREAM:-ws.inbox}
      - WS_REDIS_DSN=${WS_REDIS_DSN:-redis://redis:6379}
      - WS_REDIS_STREAM=${WS_REDIS_STREAM:-ws.outbox}
      - WS_REDIS_EVENTS_STREAM=${WS_REDIS_EVENTS_STREAM:-ws.events}
      - WS_PRESENCE_INTERPRETATION_STRATEGY=none
      - WS_PRESENCE_WRITER_TYPE=none
      - JWT_SECRET_KEY=/run/keys/dev_private.pem
      - JWT_PUBLIC_KEY=/run/keys/dev_public.pem
      - JWT_PASSPHRASE=
      - CHAT_MAX_FILE_SIZE_BYTES=${CHAT_MAX_FILE_SIZE_BYTES:-5242880}
      - CHAT_MAX_VIDEO_SIZE_BYTES=${CHAT_MAX_VIDEO_SIZE_BYTES:-15728640}
      - CHAT_MAX_VIDEO_DURATION_SECONDS=${CHAT_MAX_VIDEO_DURATION_SECONDS:-20}
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://localhost:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - LIVEKIT_TOKEN_TTL=${LIVEKIT_TOKEN_TTL:-600}
    volumes:
      - ./scripts/keys/dev_private.pem:/run/keys/dev_private.pem:ro
      - ./scripts/keys/dev_public.pem:/run/keys/dev_public.pem:ro
    healthcheck:
      test: ["CMD", "php", "-r", "file_get_contents('http://localhost:8000/api/ping');"]
      interval: 10s
      timeout: 3s
      retries: 5

  symfony-consumer:
    build:
      context: ./symfony
      dockerfile: Dockerfile
      args:
        INSTALL_GRPC: "1"
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=prod
      - DATABASE_URL=${DATABASE_URL:-mysql://app:app@mysql:3306/app?serverVersion=mariadb-10.11.0&charset=utf8mb4}
      - WS_MODE=core
      - WS_TRANSPORT_TYPE=redis_stream
      - WS_PRESENCE_TYPE=redis
      - WS_PRESENCE_INTERPRETATION_STRATEGY=none
      - WS_PRESENCE_WRITER_TYPE=none
      - DEMO_INBOX_REDIS_DSN=${DEMO_INBOX_REDIS_DSN:-redis://redis:6379}
      - DEMO_INBOX_REDIS_STREAM=${DEMO_INBOX_REDIS_STREAM:-ws.inbox}
      - WS_REDIS_DSN=${WS_REDIS_DSN:-redis://redis:6379}
      - WS_REDIS_STREAM=${WS_REDIS_STREAM:-ws.outbox}
      - WS_REDIS_EVENTS_STREAM=${WS_REDIS_EVENTS_STREAM:-ws.events}
      - "WS_REDIS_PREFIX=presence:"
      - WS_CONSUMER_LOG_LEVEL=info
      - JWT_SECRET_KEY=/run/keys/dev_private.pem
      - JWT_PUBLIC_KEY=/run/keys/dev_public.pem
      - JWT_PASSPHRASE=
      - CHAT_MAX_FILE_SIZE_BYTES=${CHAT_MAX_FILE_SIZE_BYTES:-5242880}
      - CHAT_MAX_VIDEO_SIZE_BYTES=${CHAT_MAX_VIDEO_SIZE_BYTES:-15728640}
      - CHAT_MAX_VIDEO_DURATION_SECONDS=${CHAT_MAX_VIDEO_DURATION_SECONDS:-20}
    volumes:
      - ./scripts/keys/dev_private.pem:/run/keys/dev_private.pem:ro
      - ./scripts/keys/dev_public.pem:/run/keys/dev_public.pem:ro
    command: ["sh", "-lc", "php bin/console ws:consume"]
    depends_on:
      - mysql
      - redis

  mysql:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-app}
      - MYSQL_USER=${MYSQL_USER:-app}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-app}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2
    restart: unless-stopped
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=${MYSQL_USER:-app}
      - PMA_PASSWORD=${MYSQL_PASSWORD:-app}
    ports:
      - "8181:80"
    depends_on:
      - mysql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    profiles: ["brokers"]
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command:
      - --bind
      - 0.0.0.0
      - --node-ip
      - ${LIVEKIT_NODE_IP:-127.0.0.1}
      - --keys
      - "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}"
      - --udp-port
      - "7882"
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "7882:7882/udp"

volumes:
  redis-data:
  rabbitmq-data:
  mysql-data:
