api_ping:
  path: /api/ping
  methods: [GET]
  controller: App\Controller\DemoController::ping

api_push_demo:
  path: /api/push-demo/{userId}
  methods: [POST]
  controller: App\Controller\DemoController::pushDemo

api_register:
  path: /api/register
  methods: [POST]
  controller: App\Controller\AuthController::register

api_online:
  path: /api/online
  methods: [GET]
  controller: App\Controller\DemoController::online

ws_last_message:
  path: /api/ws/last-message
  methods: [GET]
  controller: App\Controller\CoreDemoController::lastMessage

snoke_ws_events:
  path: /internal/ws/events
  methods: [POST]
  controller: Snoke\WsBundle\Controller\WebhookController::handle

demo_chat:
  path: /demo/chat
  methods: [GET]
  controller: App\Controller\ChatDemoController::chatPage
