services:
  traefik:
    image: traefik:v3.0
    command:
      - --providers.file.filename=/etc/traefik/traefik.yml
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    ports:
      - "8180:80"
      - "8443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro

  gateway:
    environment:
      - JWT_ALG=RS256
      - JWT_USER_ID_CLAIM=user_id
      - JWT_PUBLIC_KEY=
      - JWT_JWKS_URL=
      - GATEWAY_API_KEY=dev-key
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - JWT_PUBLIC_KEY_FILE=/run/keys/dev_public.pem
    volumes:
      - ./scripts/keys/dev_public.pem:/run/keys/dev_public.pem:ro
    labels:
      - traefik.http.routers.ws.rule=PathPrefix(`/ws`) || PathPrefix(`/internal`)
      - traefik.http.routers.ws.entrypoints=web
      - traefik.http.services.ws.loadbalancer.server.port=8000

  symfony:
    build:
      context: ./symfony
      dockerfile: Dockerfile
      args:
        INSTALL_GRPC: "0"
    environment:
      - APP_ENV=dev
      - DATABASE_URL=mysql://app:app@mysql:3306/app?serverVersion=mariadb-10.11&charset=utf8mb4
      - WS_PRESENCE_INTERPRETATION_STRATEGY=none
      - WS_PRESENCE_WRITER_TYPE=none
      - WS_TRACING_ENABLED=0
      - WS_TRACING_EXPORTER=stdout
      - OTEL_SERVICE_NAME=symfony
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - WS_TRACEPARENT_FIELD=traceparent
      - WS_TRACE_ID_FIELD=trace_id
      - DEMO_API_KEY=dev-demo-key
      - DEMO_JWT_PRIVATE_KEY_FILE=/run/keys/dev_private.pem
      - JWT_SECRET_KEY=/run/keys/dev_private.pem
      - JWT_PUBLIC_KEY=/run/keys/dev_public.pem
      - JWT_PASSPHRASE=
    volumes:
      - ./scripts/keys/dev_private.pem:/run/keys/dev_private.pem:ro
      - ./scripts/keys/dev_public.pem:/run/keys/dev_public.pem:ro
    labels:
      - traefik.http.routers.api.rule=PathPrefix(`/api`) || PathPrefix(`/internal/ws`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.services.api.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD-SHELL", "php -r \"echo file_get_contents('http://localhost:8000/api/ping');\""]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["sh", "-lc", "php bin/console doctrine:schema:update --force && php -S 0.0.0.0:8000 -t public public/index.php"]
    depends_on:
      - mysql

  mysql:
    image: mariadb:10.11
    environment:
      - MYSQL_DATABASE=app
      - MYSQL_USER=app
      - MYSQL_PASSWORD=app
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=app
      - PMA_PASSWORD=app
    ports:
      - "8181:80"
    depends_on:
      - mysql

volumes:
  mysql-data:
