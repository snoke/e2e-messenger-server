services:
  traefik:
    image: traefik:v3.0
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "8180:80"
      - "8443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./scripts/keys/lan_tls_fullchain.crt:/etc/traefik/certs/lan_tls.crt:ro
      - ./scripts/keys/lan_tls.key:/etc/traefik/certs/lan_tls.key:ro

  gateway:
    image: alpine:3.20
    command: ["sh", "-lc", "echo 'Select a transport overlay: docker-compose.http3.yaml or docker-compose.websocket.yaml'; sleep infinity"]
    environment:
      - JWT_ALG=RS256
      - JWT_USER_ID_CLAIM=username
      - JWT_PUBLIC_KEY=
      - JWT_JWKS_URL=
      - GATEWAY_API_KEY=dev-key
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - JWT_PUBLIC_KEY_FILE=/run/keys/dev_public.pem
      - AUTH_BACKEND_BASE_URL=${AUTH_BACKEND_BASE_URL:-http://symfony:8000}
      - AUTH_REQUEST_TIMEOUT_MS=${AUTH_REQUEST_TIMEOUT_MS:-8000}
      - REDIS_DSN=redis://redis:6379
      - REDIS_STREAM=ws.outbox
      - REDIS_INBOX_STREAM=ws.inbox
      - REDIS_EVENTS_STREAM=ws.events
      - MAX_CONNECTIONS_PER_USER=${MAX_CONNECTIONS_PER_USER:-0}
      - CONNECTION_STALE_SECONDS=${CONNECTION_STALE_SECONDS:-120}
      - CONNECTION_PRUNE_INTERVAL_SECONDS=${CONNECTION_PRUNE_INTERVAL_SECONDS:-15}
      - HTTP_API_PORT=8080
      - RUST_LOG=info
    volumes:
      - ./scripts/keys/dev_public.pem:/run/keys/dev_public.pem:ro
    labels:
      - traefik.http.routers.ws.rule=PathPrefix(`/internal`)
      - traefik.http.routers.ws.entrypoints=web
      - traefik.http.services.ws.loadbalancer.server.port=8080

  symfony:
    build:
      context: ./symfony
      dockerfile: Dockerfile
      args:
        INSTALL_GRPC: "0"
    environment:
      - APP_ENV=dev
      - APP_SECRET=${APP_SECRET:-dev-app-secret}
      - DATABASE_URL=mysql://app:app@mysql:3306/app?serverVersion=mariadb-10.11.0&charset=utf8mb4
      - WS_PRESENCE_INTERPRETATION_STRATEGY=none
      - WS_PRESENCE_WRITER_TYPE=none
      - WS_TRACING_ENABLED=0
      - WS_TRACING_EXPORTER=stdout
      - OTEL_SERVICE_NAME=symfony
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - WS_TRACEPARENT_FIELD=traceparent
      - WS_TRACE_ID_FIELD=trace_id
      - DEMO_API_KEY=dev-demo-key
      - DEMO_JWT_PRIVATE_KEY_FILE=/run/keys/dev_private.pem
      - JWT_SECRET_KEY=/run/keys/dev_private.pem
      - JWT_PUBLIC_KEY=/run/keys/dev_public.pem
      - JWT_PASSPHRASE=
      - CHAT_MAX_FILE_SIZE_BYTES=${CHAT_MAX_FILE_SIZE_BYTES:-5242880}
      - CHAT_MAX_VIDEO_SIZE_BYTES=${CHAT_MAX_VIDEO_SIZE_BYTES:-15728640}
      - CHAT_MAX_VIDEO_DURATION_SECONDS=${CHAT_MAX_VIDEO_DURATION_SECONDS:-20}
      - DROPBOX_FILE_UPLOAD_ENABLED=${DROPBOX_FILE_UPLOAD_ENABLED:-false}
      - DROPBOX_FILE_UPLOAD_MAX_BYTES=${DROPBOX_FILE_UPLOAD_MAX_BYTES:-5242880}
      - ATTACHMENT_STORAGE_SYSTEM=${ATTACHMENT_STORAGE_SYSTEM:-host}
      - USER_STORAGE_SYSTEM=${USER_STORAGE_SYSTEM:-host}
      - DROPBOX_APP_KEY=${DROPBOX_APP_KEY:-}
      - DROPBOX_APP_SECRET=${DROPBOX_APP_SECRET:-}
      - DROPBOX_REFRESH_TOKEN=${DROPBOX_REFRESH_TOKEN:-}
      - DROPBOX_ACCESS_TOKEN=${DROPBOX_ACCESS_TOKEN:-}
      - DROPBOX_ROOT_PATH=${DROPBOX_ROOT_PATH:-/void-storage}
      - DROPBOX_TIMEOUT_SECONDS=${DROPBOX_TIMEOUT_SECONDS:-15}
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://localhost:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - LIVEKIT_TOKEN_TTL=${LIVEKIT_TOKEN_TTL:-600}
    volumes:
      - ./scripts/keys/dev_private.pem:/run/keys/dev_private.pem:ro
      - ./scripts/keys/dev_public.pem:/run/keys/dev_public.pem:ro
      - chat-attachments:/app/var/chat_attachments
    labels:
      - traefik.http.routers.api.rule=PathPrefix(`/api`) || PathPrefix(`/internal/ws`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.services.api.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD-SHELL", "php -r \"echo file_get_contents('http://localhost:8000/api/ping');\""]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["sh", "-lc", "php bin/console doctrine:schema:update --force && php -S 0.0.0.0:8000 -t public public/index.php"]
    depends_on:
      - mysql

  mysql:
    image: mariadb:10.11
    environment:
      - MYSQL_DATABASE=app
      - MYSQL_USER=app
      - MYSQL_PASSWORD=app
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=app
      - PMA_PASSWORD=app
    ports:
      - "8181:80"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    command: >
      sh -lc "if [ ! -d node_modules ] || [ ! -d node_modules/rollup ] || [ ! -d node_modules/vite ] || [ ! -d node_modules/ts-mls ] || [ ! -d node_modules/@fortawesome/fontawesome-free ]; then npm install; fi; if [ ! -d node_modules/@rollup/rollup-linux-arm64-musl ]; then npm install --no-save @rollup/rollup-linux-arm64-musl; fi; npm run dev"
    environment:
      - VITE_PROXY_TARGET=http://symfony:8000
      - VITE_E2EE_ENABLED=true
      - VITE_E2EE_DEBUG=true
      - VITE_WS_URL=${VITE_WS_URL:-wss://192.168.8.201:8443/ws}
      - VITE_GROUP_CRYPTO_MODE=${VITE_GROUP_CRYPTO_MODE:-mls}
      - VITE_MLS_CLIENT_ADAPTER=${VITE_MLS_CLIENT_ADAPTER:-ts_mls}
      - VITE_CALL_MEDIA_E2EE_ENABLED=${VITE_CALL_MEDIA_E2EE_ENABLED:-false}
      - VITE_CHAT_HISTORY_PAGE_SIZE=${VITE_CHAT_HISTORY_PAGE_SIZE:-5}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql-data:
  chat-attachments:
