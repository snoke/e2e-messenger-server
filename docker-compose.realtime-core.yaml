services:
  frontend:
    environment:
      - VITE_WS_MODE=core
      - VITE_REALTIME_TRANSPORT=${VITE_REALTIME_TRANSPORT:-}
      - VITE_WS_URL=${VITE_WS_URL:-}
      - VITE_GROUP_CRYPTO_MODE=${VITE_GROUP_CRYPTO_MODE:-sender_keys}
      - VITE_WEBRTC_STUN_URL=${VITE_WEBRTC_STUN_URL:-stun:localhost:3478}
      - VITE_WEBRTC_TURN_URL=${VITE_WEBRTC_TURN_URL:-turn:localhost:3478?transport=udp}
      - VITE_WEBRTC_TURN_USERNAME=${VITE_WEBRTC_TURN_USERNAME:-turn}
      - VITE_WEBRTC_TURN_PASSWORD=${VITE_WEBRTC_TURN_PASSWORD:-turn}
      - VITE_LIVEKIT_URL=${VITE_LIVEKIT_URL:-ws://localhost:7880}
      - VITE_CHAT_HISTORY_PAGE_SIZE=${VITE_CHAT_HISTORY_PAGE_SIZE:-5}
      - VITE_CHAT_MAX_VIDEO_SIZE_BYTES=${VITE_CHAT_MAX_VIDEO_SIZE_BYTES:-15728640}
      - VITE_CHAT_MAX_VIDEO_DURATION_SECONDS=${VITE_CHAT_MAX_VIDEO_DURATION_SECONDS:-20}

  gateway:
    environment:
      - WS_MODE=core
      - REDIS_DSN=redis://redis:6379
      - REDIS_STREAM=ws.outbox
      - REDIS_INBOX_STREAM=ws.inbox
      - REDIS_EVENTS_STREAM=ws.events
      - MAX_CONNECTIONS_PER_USER=${MAX_CONNECTIONS_PER_USER:-0}
      - CONNECTION_STALE_SECONDS=${CONNECTION_STALE_SECONDS:-120}
      - CONNECTION_PRUNE_INTERVAL_SECONDS=${CONNECTION_PRUNE_INTERVAL_SECONDS:-15}

  symfony:
    environment:
      - WS_MODE=core
      - WS_TRANSPORT_TYPE=redis_stream
      - WS_PRESENCE_TYPE=http
      - WS_PRESENCE_INTERPRETATION_STRATEGY=none
      - WS_PRESENCE_WRITER_TYPE=none
      - WS_EVENTS_TYPE=redis_stream
      - WS_GATEWAY_BASE_URL=${WS_GATEWAY_BASE_URL:-http://gateway:8080}
      - WS_TRACING_ENABLED=0
      - WS_TRACING_EXPORTER=stdout
      - OTEL_SERVICE_NAME=symfony
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - WS_TRACEPARENT_FIELD=traceparent
      - WS_TRACE_ID_FIELD=trace_id
      - DEMO_INBOX_REDIS_DSN=redis://redis:6379
      - DEMO_INBOX_REDIS_STREAM=ws.inbox
      - WS_REDIS_DSN=redis://redis:6379
      - WS_REDIS_STREAM=ws.outbox
      - WS_REDIS_EVENTS_STREAM=ws.events
      - "WS_REDIS_PREFIX=presence:"
      - WS_RABBITMQ_DSN=amqp://guest:guest@rabbitmq:5672/%2f
      - WS_RABBITMQ_EVENTS_EXCHANGE=ws.events
      - WS_RABBITMQ_EVENTS_QUEUE=ws.events
      - WS_RABBITMQ_EVENTS_ROUTING_KEY=ws.events
      - CHAT_MAX_FILE_SIZE_BYTES=${CHAT_MAX_FILE_SIZE_BYTES:-5242880}
      - CHAT_MAX_VIDEO_SIZE_BYTES=${CHAT_MAX_VIDEO_SIZE_BYTES:-15728640}
      - CHAT_MAX_VIDEO_DURATION_SECONDS=${CHAT_MAX_VIDEO_DURATION_SECONDS:-20}
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://localhost:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - LIVEKIT_TOKEN_TTL=${LIVEKIT_TOKEN_TTL:-600}

  symfony-consumer:
    build:
      context: ./symfony
      dockerfile: Dockerfile
      args:
        INSTALL_GRPC: "0"
    working_dir: /app
    environment:
      - APP_ENV=dev
      - DATABASE_URL=mysql://app:app@mysql:3306/app?serverVersion=mariadb-10.11.0&charset=utf8mb4
      - WS_MODE=core
      - WS_TRACING_ENABLED=0
      - WS_TRACING_EXPORTER=stdout
      - OTEL_SERVICE_NAME=symfony
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - WS_TRACEPARENT_FIELD=traceparent
      - WS_TRACE_ID_FIELD=trace_id
      - JWT_SECRET_KEY=/run/keys/dev_private.pem
      - JWT_PUBLIC_KEY=/run/keys/dev_public.pem
      - JWT_PASSPHRASE=
      - WS_TRANSPORT_TYPE=redis_stream
      - WS_PRESENCE_TYPE=http
      - WS_PRESENCE_INTERPRETATION_STRATEGY=none
      - WS_PRESENCE_WRITER_TYPE=none
      - WS_GATEWAY_BASE_URL=${WS_GATEWAY_BASE_URL:-http://gateway:8080}
      - DEMO_INBOX_REDIS_DSN=redis://redis:6379
      - DEMO_INBOX_REDIS_STREAM=ws.inbox
      - WS_REDIS_DSN=redis://redis:6379
      - WS_REDIS_STREAM=ws.outbox
      - WS_REDIS_EVENTS_STREAM=ws.events
      - "WS_REDIS_PREFIX=presence:"
      - WS_CONSUMER_LOG_LEVEL=info
      - CHAT_MAX_FILE_SIZE_BYTES=${CHAT_MAX_FILE_SIZE_BYTES:-5242880}
      - CHAT_MAX_VIDEO_SIZE_BYTES=${CHAT_MAX_VIDEO_SIZE_BYTES:-15728640}
      - CHAT_MAX_VIDEO_DURATION_SECONDS=${CHAT_MAX_VIDEO_DURATION_SECONDS:-20}
    volumes:
      - ./scripts/keys/dev_private.pem:/run/keys/dev_private.pem:ro
      - ./scripts/keys/dev_public.pem:/run/keys/dev_public.pem:ro
    command: ["sh", "-lc", "php bin/console ws:consume"]
    depends_on:
      - mysql
      - redis
    healthcheck:
      test: ["CMD-SHELL", "grep -q ws:consume /proc/1/cmdline"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    ports:
      - "5672:5672"
      - "8167:15672"
      - "8168:15692"
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro

  coturn:
    image: coturn/coturn:latest
    command:
      - -n
      - --log-file=stdout
      - --realm=${TURN_REALM:-localhost}
      - --fingerprint
      - --lt-cred-mech
      - --user=${TURN_USERNAME:-turn}:${TURN_PASSWORD:-turn}
      - --min-port=${TURN_MIN_PORT:-49160}
      - --max-port=${TURN_MAX_PORT:-49200}
      - --no-cli
      - --no-tls
      - --no-dtls
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}:${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}/udp"
      - "${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}:${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}/tcp"

  livekit:
    image: livekit/livekit-server:latest
    command:
      - --dev
      - --bind
      - 0.0.0.0
      - --keys
      - "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}"
      - --udp-port
      - "7882"
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "7882:7882/udp"
