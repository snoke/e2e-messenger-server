services:
  gateway:
    image: symfony-realtime-stack-supergateway
    build: ./gateway/rust-http3-gateway
    command: null
    ports:
      - "8080:8000"
      - "8081:8080"
    environment:
      - GATEWAY_TRANSPORT=websocket
      - WEBSOCKET_PORT=8000
      - HTTP_API_PORT=8080

  frontend:
    environment:
      - VITE_REALTIME_TRANSPORT=ws
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8080/ws}
